<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Music Player</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar glass-panel">
            <div class="sidebar-header">
                <i data-lucide="music-4" class="logo-icon"></i>
                <h1 class="logo-text">LocalBox</h1>
            </div>
            
            <button id="select-folder-btn" class="btn-primary w-full">
                <i data-lucide="folder-search"></i>
                Select Music Folder
            </button>
            <input type="file" id="fallback-folder-input" webkitdirectory directory multiple class="hide">
            <div class="playlist-header mt-8">
                <h3>My Library</h3>
                <span id="track-count" class="badge">0 tracks</span>
            </div>
            <div id="playlist" class="playlist">
                <div class="empty-state">
                    <i data-lucide="disc-3" class="empty-icon"></i>
                    <p>No folder selected</p>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="now-playing-view">
                <div id="visualizer-container" class="visualizer">
                    <div class="album-art-container">
                        <img id="album-art" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='400' viewBox='0 0 400 400'><rect width='400' height='400' fill='%231E1B4B'/></svg>" alt="Album Art" class="default-art hide">
                        <div id="album-art-fallback" class="album-art-fallback">
                            <i data-lucide="music"></i>
                        </div>
                    </div>
                </div>
                <div class="track-info-large">
                    <h2 id="current-title-large">Welcome to LocalBox</h2>
                    <p id="current-artist-large">Select a folder to begin</p>
                </div>
            </div>
        </main>

        <!-- Bottom Control Bar -->
        <footer class="player-bar glass-panel">
            <div class="track-info">
                <img id="mini-album-art" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='56' height='56' viewBox='0 0 56 56'><rect width='56' height='56' fill='%231E1B4B'/></svg>" alt="Cover" class="hide">
                <div id="mini-art-fallback" class="mini-art-fallback">
                    <i data-lucide="music"></i>
                </div>
                <div class="info-text">
                    <h4 id="current-title">Not Playing</h4>
                    <p id="current-artist">--</p>
                </div>
            </div>

            <div class="player-controls">
                <div class="buttons">
                    <button id="btn-shuffle" class="control-btn" aria-label="Shuffle">
                        <i data-lucide="shuffle"></i>
                    </button>
                    <button id="btn-prev" class="control-btn" aria-label="Previous">
                        <i data-lucide="skip-back"></i>
                    </button>
                    <button id="btn-play" class="control-btn play-btn" aria-label="Play">
                        <span id="play-wrapper" style="display:flex"><i data-lucide="play"></i></span>
                        <span id="pause-wrapper" class="hide" style="display:flex"><i data-lucide="pause"></i></span>
                    </button>
                    <button id="btn-next" class="control-btn" aria-label="Next">
                        <i data-lucide="skip-forward"></i>
                    </button>
                </div>
                <div class="progress-container">
                    <span id="time-current" class="time">0:00</span>
                    <input type="range" id="progress-bar" class="custom-slider" min="0" max="100" value="0">
                    <span id="time-total" class="time">0:00</span>
                </div>
            </div>

            <div class="volume-controls">
                <span id="vol-mute" class="hide" style="display:flex"><i data-lucide="volume-x"></i></span>
                <span id="vol-low" class="hide" style="display:flex"><i data-lucide="volume-1"></i></span>
                <span id="vol-high" style="display:flex"><i data-lucide="volume-2"></i></span>
                <input type="range" id="volume-bar" class="custom-slider" min="0" max="1" step="0.01" value="1">
            </div>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
